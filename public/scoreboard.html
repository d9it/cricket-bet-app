<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CricketBet — Live Scoreboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="navbar"></div>

<div class="container" style="padding-top:24px;padding-bottom:60px;">

  <div id="alert-box"></div>
  <div id="page-loading" class="loading"><div class="spinner"></div>Loading scoreboard…</div>

  <div id="scoreboard-content" class="hidden">

    <!-- WINNER BANNER (shown when finished) -->
    <div id="winner-banner" class="hidden winner-banner mb-3">
      <div class="trophy">🏆</div>
      <h2 id="winner-text">Winner!</h2>
      <p id="winner-pot"></p>
      <div class="mt-3">
        <a href="/dashboard.html" class="btn btn-gold btn-lg">Back to Dashboard</a>
      </div>
    </div>

    <!-- MATCH INFO -->
    <div class="score-header mb-3">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:0.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em" id="sb-format-label"></div>
          <h1 id="sb-match-name" style="font-size:1.3rem;font-weight:700;margin-top:2px">Loading…</h1>
        </div>
        <div id="sb-live-badge"></div>
      </div>
      <div style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap">
        <div>
          <span style="color:var(--text2);font-size:0.8rem">Bet per player:</span>
          <strong id="sb-bet" style="color:var(--gold)"></strong>
        </div>
        <div>
          <span style="color:var(--text2);font-size:0.8rem">Total pot:</span>
          <strong id="sb-pot" style="color:var(--gold)"></strong>
        </div>
        <div>
          <span style="color:var(--text2);font-size:0.8rem">Room:</span>
          <strong id="sb-room" style="color:var(--white)"></strong>
        </div>
      </div>
    </div>

    <!-- SCORECARDS GRID -->
    <section>
      <h2 id="sb-section-title">🏏 Live Player Scores</h2>
      <div class="scoreboard-grid" id="scoreboard-grid"></div>
    </section>

    <!-- LEADERBOARD -->
    <section>
      <h2>🏆 Leaderboard</h2>
      <div class="leaderboard" id="leaderboard"></div>
    </section>

    <!-- DETAILED SCORECARD -->
    <section>
      <h2>📊 Match Scorecard</h2>
      <div id="match-scorecard">
        <div class="loading" style="padding:20px"><div class="spinner"></div>Fetching live data…</div>
      </div>
    </section>

    <!-- HOST CONTROLS -->
    <div id="host-controls" class="hidden" style="margin-top:24px">
      <div class="card text-center">
        <div class="card-title">⚙️ Host Controls</div>
        <p class="text-muted mb-3" style="font-size:0.85rem">End the game manually when the match is over</p>
        <button class="btn btn-danger" onclick="finalizeGame()">🏁 End Game & Declare Winner</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:16px;color:var(--text2);font-size:0.8rem" id="last-updated"></div>
  </div>

</div>

<script src="/js/app.js"></script>
<script>
if (!requireAuth()) throw new Error('not authed');

const params = new URLSearchParams(location.search);
const gameId = params.get('game');
if (!gameId) location.href = '/dashboard.html';

const user = getUser();
let pollInterval = null;
let scorecard = null;
let gameData = null;

async function loadScoreboard() {
  try {
    gameData = await apiFetch(`/games/${gameId}/scores`);
    const { game, participants, currentUserId } = gameData;

    document.getElementById('page-loading').classList.add('hidden');
    document.getElementById('scoreboard-content').classList.remove('hidden');

    // Redirect to lobby if still in selection phase
    if (game.status === 'selecting' || game.status === 'waiting') {
      window.location.href = `/lobby.html?game=${gameId}`;
      return;
    }

    renderHeader(game, participants);
    renderScoreboards(game, participants);
    renderLeaderboard(participants);

    if (game.status === 'live') {
      fetchAndUpdateScores(game);
    }

    if (game.status === 'finished') {
      showWinnerBanner(game, participants, currentUserId);
    }

    // Host controls
    if (game.createdBy === currentUserId && game.status === 'live') {
      // We need createdBy from lobby — approximate check
    }

  } catch (err) {
    document.getElementById('page-loading').innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function fetchAndUpdateScores(game) {
  if (!game.matchId) { renderMockScorecard(); return; }
  try {
    scorecard = await apiFetch(`/cricket/scorecard/${game.matchId}`);
    renderMatchScorecard(scorecard, game);

    // Push scores to server
    const updated = await apiFetch(`/games/${gameId}/update-scores`, {
      method: 'POST',
      body: JSON.stringify({ scorecard })
    });

    if (updated.isFinished) {
      showWinnerBannerFromResult(updated);
      clearInterval(pollInterval);
      return;
    }

    // Re-render scoreboards with updated runs
    const updatedGame = await apiFetch(`/games/${gameId}/scores`);
    renderScoreboards(updatedGame.game, updatedGame.participants);
    renderLeaderboard(updatedGame.participants);

    document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    console.warn('Score fetch error:', err.message);
  }
}

function renderHeader(game, participants) {
  document.getElementById('sb-format-label').textContent = game.format.toUpperCase() + ' MATCH';
  document.getElementById('sb-match-name').textContent = `${game.teamAName} vs ${game.teamBName}`;
  document.getElementById('sb-bet').textContent = ' ' + formatPoints(game.betAmount);
  document.getElementById('sb-pot').textContent = ' ' + formatPoints(game.betAmount * participants.length);
  document.getElementById('sb-room').textContent = ' ' + game.roomCode;

  const badge = document.getElementById('sb-live-badge');
  if (game.status === 'live') {
    badge.innerHTML = '<span><span class="live-dot"></span>LIVE</span>';
  } else if (game.status === 'finished') {
    badge.innerHTML = '<span class="badge badge-done">FINISHED</span>';
    document.getElementById('sb-section-title').textContent = '📊 Final Scores';
    clearInterval(pollInterval);
  }
}

function renderScoreboards(game, participants) {
  const topRuns = Math.max(...participants.map(p => p.totalRuns));
  const grid = document.getElementById('scoreboard-grid');
  grid.innerHTML = participants.map(p => {
    const isLeading = p.totalRuns === topRuns && topRuns > 0;
    const isYou = p.userId === user.id;
    return `
    <div class="score-card ${isLeading ? 'leading' : ''}">
      <div class="score-card-header">
        <div>
          <div class="player-name">${escHtml(p.username)}${isYou ? ' <span style="font-size:0.7rem;color:var(--text2)">(You)</span>' : ''}</div>
          ${isLeading ? '<div style="font-size:0.75rem;color:var(--gold)">👑 Leading</div>' : ''}
        </div>
        <div class="total">${p.totalRuns} <span style="font-size:0.8rem;font-weight:400;color:var(--text2)">runs</span></div>
      </div>
      <div class="score-card-body">
        ${p.selectedPositions.map(pos => {
          const batsmanInfo = getBatsmanInfo(pos.team, pos.position);
          return `
          <div class="pick-row">
            <div class="pick-pos">
              <span class="pick-team-tag ${pos.team}">${pos.team}</span>
              <span>#${pos.position}</span>
              <span class="pick-batsman">${escHtml(batsmanInfo.name)}</span>
            </div>
            <div class="pick-runs">${batsmanInfo.runs} <span style="font-size:0.75rem;font-weight:400;color:var(--text2)">runs</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function getBatsmanInfo(team, position) {
  if (!scorecard || !scorecard.teams) return { name: `Batsman ${position}`, runs: '—' };
  const idx = team === 'A' ? 0 : 1;
  const batsman = scorecard.teams[idx]?.batsmen?.find(b => b.position === position);
  return batsman ? { name: batsman.name, runs: batsman.runs } : { name: `Batsman ${position}`, runs: 0 };
}

function renderLeaderboard(participants) {
  const sorted = [...participants].sort((a, b) => b.totalRuns - a.totalRuns);
  document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => `
    <div class="lb-row ${i === 0 ? 'rank-1' : ''}">
      <div class="lb-rank ${i === 0 ? 'gold' : ''}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</div>
      <div class="lb-name">${escHtml(p.username)}${p.userId === user.id ? ' <span style="color:var(--text2);font-size:0.8rem">(You)</span>' : ''}</div>
      <div class="lb-runs">${p.totalRuns} <span style="font-size:0.75rem;color:var(--text2);font-weight:400">runs</span></div>
    </div>`).join('');
}

function renderMatchScorecard(sc, game) {
  const el = document.getElementById('match-scorecard');
  if (!sc || !sc.teams || !sc.teams.length) { el.innerHTML = '<p class="text-muted">Scorecard not available</p>'; return; }

  el.innerHTML = sc.teams.map((team, idx) => `
    <div class="card mb-3 ${idx > 0 ? 'mt-3' : ''}">
      <div class="card-title">
        <span class="pick-team-tag ${idx === 0 ? 'A' : 'B'}" style="font-size:0.8rem">${idx === 0 ? 'A' : 'B'}</span>
        ${escHtml(team.name)} — Batting
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.88rem">
          <thead>
            <tr style="color:var(--text2);border-bottom:1px solid var(--border)">
              <th style="text-align:left;padding:8px 6px">#</th>
              <th style="text-align:left;padding:8px 6px">Batsman</th>
              <th style="text-align:right;padding:8px 6px">Runs</th>
              <th style="text-align:right;padding:8px 6px">Balls</th>
              <th style="text-align:left;padding:8px 6px">Status</th>
            </tr>
          </thead>
          <tbody>
            ${team.batsmen.map(b => `
              <tr style="border-bottom:1px solid var(--border)">
                <td style="padding:9px 6px;color:var(--text2)">${b.position}</td>
                <td style="padding:9px 6px;font-weight:600">${escHtml(b.name)}</td>
                <td style="padding:9px 6px;text-align:right;font-weight:700;color:var(--gold)">${b.runs}</td>
                <td style="padding:9px 6px;text-align:right;color:var(--text2)">${b.balls}</td>
                <td style="padding:9px 6px;color:var(--text2);font-size:0.8rem">${escHtml(b.status)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`).join('');
}

function renderMockScorecard() {
  document.getElementById('match-scorecard').innerHTML = '<p class="text-muted" style="padding:12px">No match selected — scores are simulated for demo.</p>';
}

function showWinnerBanner(game, participants, currentUserId) {
  if (game.status !== 'finished') return;
  const sorted = [...participants].sort((a, b) => b.totalRuns - a.totalRuns);
  const topRuns = sorted[0].totalRuns;
  const winners = sorted.filter(p => p.totalRuns === topRuns);
  const pot = game.betAmount * participants.length;

  const banner = document.getElementById('winner-banner');
  banner.classList.remove('hidden');

  const isWinner = winners.some(w => w.userId === currentUserId);
  if (winners.length === 1) {
    document.getElementById('winner-text').textContent = `🏆 ${winners[0].username} Wins!`;
    document.getElementById('winner-pot').textContent = `${formatPoints(pot)} earned · ${winners[0].totalRuns} runs`;
  } else {
    document.getElementById('winner-text').textContent = `🤝 It's a Tie!`;
    document.getElementById('winner-pot').textContent = `${winners.map(w=>w.username).join(' & ')} split ${formatPoints(pot)}`;
  }

  if (isWinner) banner.style.borderColor = 'var(--gold)';
}

function showWinnerBannerFromResult(result) {
  clearInterval(pollInterval);
  loadScoreboard(); // reload with finished state
}

async function finalizeGame() {
  if (!confirm('End the game and declare a winner based on current scores?')) return;
  try {
    const res = await apiFetch(`/games/${gameId}/finalize`, { method: 'POST' });
    loadScoreboard();
  } catch (err) {
    showAlert('alert-box', err.message);
  }
}

// Start
loadScoreboard();
// Poll every 15 seconds for live updates
pollInterval = setInterval(loadScoreboard, 15000);
window.addEventListener('beforeunload', () => clearInterval(pollInterval));
</script>
</body>
</html>
