<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CricketBet — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-box">

    <div class="auth-header">
      <div class="logo">🏏</div>
      <h1>CricketBet</h1>
      <p>Fantasy cricket betting with friends</p>
    </div>

    <div class="card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</div>
      </div>

      <div id="alert-box"></div>

      <!-- LOGIN FORM -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Sign In</button>
        <p class="text-center mt-3" style="color:var(--text2);font-size:0.85rem;">
          New here? <a href="#" onclick="switchTab('register')">Create an account</a> — starts with <strong style="color:var(--gold)">1,000 free points!</strong>
        </p>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="reg-username" class="form-control" placeholder="CricketKing99" required minlength="3" maxlength="20" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="reg-btn">Create Account</button>
        <p class="text-center mt-3" style="color:var(--text2);font-size:0.85rem;">
          Already have an account? <a href="#" onclick="switchTab('login')">Sign in</a>
        </p>
      </form>
    </div>

  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (getToken()) window.location.href = '/dashboard.html';

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('login-form').classList.toggle('hidden', !isLogin);
    document.getElementById('register-form').classList.toggle('hidden', isLogin);
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    clearAlert('alert-box');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    clearAlert('alert-box');
    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        })
      });
      saveAuth(data.token, data.user);
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert('alert-box', err.message);
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    clearAlert('alert-box');
    try {
      const data = await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('reg-username').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value
        })
      });
      saveAuth(data.token, data.user);
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert('alert-box', err.message);
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
